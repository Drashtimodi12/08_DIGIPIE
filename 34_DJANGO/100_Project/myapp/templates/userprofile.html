<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>UserProfiles</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        table { border-collapse: collapse; width: 80%; margin: 20px auto; }
        th, td { border: 1px solid #ccc; padding: 8px; text-align: center; }
        th { background-color: #f4f4f4; }
        button { padding: 5px 10px; margin: 2px; }
        input { padding: 5px; width: 90%; }
    </style>
</head>
<body>
    <h2 style="text-align:center;">User Profiles</h2>

    <table id="userTable">
        <thead>
            <tr>
                <th>ID</th>
                <th>User</th>
                <th>Phone</th>
                <th>Address</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <!-- AJAX content will populate here -->
        </tbody>
    </table>

    <script>
        $(document).ready(function(){

            // ===========================
            // Fetch all user profiles
            // ===========================
            function fetchUserProfiles() {
                $.ajax({
                    url: '/api/userprofiles/', // GET API
                    method: 'GET',
                    success: function(res){
                        let rows = '';
                        res.user.forEach(function(up){
                            rows += `
                                <tr data-id="${up.id}">
                                    <td>${up.id}</td>
                                    <td>${up.user}</td>
                                    <td><input type="text" class="phone" value="${up.phone}"></td>
                                    <td><input type="text" class="address" value="${up.address}"></td>
                                    <td>
                                        <button class="updateBtn">Update</button>
                                        <button class="deleteBtn">Delete</button>
                                    </td>
                                </tr>
                            `;
                        });
                        $('#userTable tbody').html(rows);
                    },
                    error: function(err){
                        alert('Error fetching user profiles!');
                    }
                });
            }

            fetchUserProfiles();

            // ===========================
            // Update UserProfile
            // ===========================
            $('#userTable').on('click', '.updateBtn', function(){
                let row = $(this).closest('tr');
                let uid = row.data('id');
                let phone = row.find('.phone').val();
                let address = row.find('.address').val();

                $.ajax({
                    url: `/api/userprofile/${uid}/`,
                    method: 'PUT',
                    contentType: 'application/json',
                    data: JSON.stringify({ phone: phone, address: address }),
                    success: function(res){
                        alert(res.message);
                        fetchUserProfiles();
                    },
                    error: function(err){
                        alert('Error updating profile!');
                    }
                });
            });

            // ===========================
            // Delete UserProfile
            // ===========================
            $('#userTable').on('click', '.deleteBtn', function(){
                if(!confirm('Are you sure?')) return;

                let row = $(this).closest('tr');
                let uid = row.data('id');

                $.ajax({
                    url: `/api/userprofile/${uid}/`,
                    method: 'DELETE',
                    success: function(res){
                        alert(res.message);
                        fetchUserProfiles();
                    },
                    error: function(err){
                        alert('Error deleting profile!');
                    }
                });
            });

        });
    </script>
</body>
</html>
